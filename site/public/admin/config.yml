backend:
  name: github
  repo: jefferson0725/mizar-lp
  branch: main

media_folder: "site/public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "site/src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Description", widget: "string" }
      - { name: "pubDate", label: "Publication date", widget: "datetime" }
      - { name: "updatedDate", label: "Updated date", widget: "datetime", required: false }
      - { name: "author", label: "Author", widget: "string", default: "Grupo Mizar" }
      - { name: "heroImage", label: "Hero image", widget: "string", required: false }
      - name: "frente"
        label: "Frente"
        widget: "select"
        options:
          - "seo-local"
          - "geo-exterior"
          - "autoridad"
        default: "seo-local"
      - { name: "tags", label: "Tags", widget: "list", default: [] }
      - { name: "draft", label: "Draft", widget: "boolean", default: false }
