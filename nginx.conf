server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /terrazas {
        try_files $uri /terrazas.html;
    }

    location /terrazas/ {
        try_files $uri /terrazas.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml image/webp;
}
